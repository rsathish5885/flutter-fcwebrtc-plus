name: Build

on:
  push:
    branches: 
      - "*/*"
  pull_request:
    branches: 
      - "*/*"

jobs:
  dart-format-and-analyze-check:
    name: Dart Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: Dart Format Check
        run: dart format lib/ test/ --set-exit-if-changed
      - name: Dart Analyze Check
        run: flutter analyze
      - name: Dart Test Check
        run: flutter test

  build-for-android:
    name: Build for Flutter Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: Build for Android
        working-directory: ./example
        run: flutter build apk

  build-for-ios:
    name: Build for Flutter iOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: Setup iOS dependencies
        run: |
          cd example/ios
          pod install --repo-update
      - name: Build for iOS
        working-directory: ./example
        run: flutter build ios --release --no-codesign

  build-for-windows:
    name: Build for flutter Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: Setup Windows build environment
        run: |
          # Add any Windows-specific setup here
          # For WebRTC plugins, you might need to download prebuilt binaries
        shell: pwsh
      - name: Build for Windows (if libraries available)
        working-directory: ./example
        run: flutter build windows --release
        continue-on-error: true

  build-for-macos:
    name: Build for flutter macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: Setup macOS dependencies
        run: |
          cd example/macos
          pod install --repo-update
      - name: Build for macOS
        working-directory: ./example
        run: flutter build macos --release

  build-for-web:
    name: Build for Flutter Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install project dependencies
        run: flutter pub get
      - name: build for Web
        working-directory: ./example
        run: flutter build web